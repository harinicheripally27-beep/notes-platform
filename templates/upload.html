{% extends "base.html" %}
{% block title %}Upload Notes — NoteShare{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <h1 class="page-title">Upload Notes</h1>
    <p class="page-sub">Share your knowledge with fellow students</p>
  </div>
</div>

<div class="container narrow">
  <div class="upload-card">
    <form method="POST" enctype="multipart/form-data" class="upload-form" id="uploadForm">
      
      <div class="form-group">
        <label>Note Title <span class="required">*</span></label>
        <input type="text" name="title" required placeholder="e.g. Data Structures — Trees and Graphs" maxlength="150" />
      </div>

      <div class="form-group">
        <label>Subject <span class="required">*</span></label>
        <select name="subject_id" required>
          <option value="">— Select a subject —</option>
          {% for s in subjects %}
          <option value="{{ s.id }}">{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Brief description of the notes, topics covered, exam relevance..."></textarea>
      </div>

      <div class="form-group">
        <label>PDF File <span class="required">*</span></label>
        <div class="file-drop" id="fileDrop">
          <input type="file" name="file" id="fileInput" accept=".pdf" required />
          <div class="file-drop-inner">
            <span class="file-icon">📎</span>
            <p id="fileLabel">Drop your PDF here or <span class="link">click to browse</span></p>
            <p class="file-hint">Maximum size: 10 MB · PDF only</p>
          </div>
        </div>
      </div>

      <div class="upload-actions">
        <a href="{{ url_for('browse') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">Upload Notes 🚀</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
