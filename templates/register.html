{% extends "base.html" %}
{% block title %}Register — NoteShare{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-icon">✨</div>
    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join thousands of students sharing knowledge</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="yourname" minlength="3" />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="At least 6 characters" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
