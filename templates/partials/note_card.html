<a href="{{ url_for('note_detail', note_id=note.id) }}" class="note-card">
  <div class="note-card-header">
    <span class="note-subject-tag">{{ note.subject_name }}</span>
    <span class="note-downloads">⬇ {{ note.downloads }}</span>
  </div>
  <h3 class="note-title">{{ note.title }}</h3>
  <p class="note-desc">{{ note.description or 'No description provided.' }}</p>
  <div class="note-card-footer">
    <div class="note-author">
      <span class="author-chip">{{ note.username[0].upper() }}</span>
      <span>{{ note.username }}</span>
    </div>
    <div class="note-meta-right">
      <span class="note-likes">❤ {{ note.likes }}</span>
      <span class="note-date">{{ note.created_at[:10] }}</span>
    </div>
  </div>
</a>
